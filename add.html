<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>添加学生</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>新增学生</h2>
    <form id="addForm">
        <input type="text" id="name" placeholder="姓名" required>
        <input type="text" id="sid" placeholder="学号" required>
        <input type="number" step="0.1" id="score" placeholder="分数" required>
        <button type="submit">提交</button>
    </form>
    <a href="dashboard.html">返回列表</a>

    <script>
        if (!localStorage.getItem('loginUser')) location.href = 'index.html';

        function getStudents() {
            return JSON.parse(localStorage.getItem('students')) || [];
        }
        function saveStudents(list) {
            localStorage.setItem('students', JSON.stringify(list));
        }

        document.getElementById('addForm').addEventListener('submit', e => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const sid = document.getElementById('sid').value.trim();
            const score = parseFloat(document.getElementById('score').value);
            const list = getStudents();
            // 自增ID
            const newId = list.length ? Math.max(...list.map(x=>x.id)) + 1 : 1;
            list.push({
                id: newId,
                name,
                student_id: sid,
                score
            });
            saveStudents(list);
            location.href = 'dashboard.html';
        })
    </script>
</body>
</html>
